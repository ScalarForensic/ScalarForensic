[project]
name = "scalar-forensic"
version = "0.1.0"
description = "A PoC for creating a large-scale vector database from images"
readme = "README.md"
requires-python = ">=3.13"
license = { file = "LICENSE" }
dependencies = []

[project.scripts]
scalar-forensic = "scalar_forensic.cli:main"

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-cov>=6.0",
    "ruff>=0.11",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/scalar_forensic"]

[tool.ruff]
src = ["src"]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=scalar_forensic --cov-report=term-missing"
