# ScalarForensic — Docker Compose stack for airgapped / offline deployment.
#
# Before first use, load the image (produced by scripts/build_airgap_image.sh):
#   docker load < scalarforensic-<tag>.tar.gz
#
# Configure the image directory (MUST be set before BOTH `docker compose up`
# AND `docker compose run` — Compose re-evaluates the variable each time):
#   Add it to .env (recommended — applies to all compose commands automatically):
#     echo 'SFN_IMAGES_DIR=/path/to/evidence/images' >> .env
#   Or export it in the shell before every compose command:
#     export SFN_IMAGES_DIR=/path/to/evidence/images
#   (Default: ./data — relative to the project folder.)
#   Changing this after the stack is running requires `docker compose down` first.
#
# Start the stack:
#
#   CPU (default — works on any machine):
#     docker compose up -d
#
#   NVIDIA GPU (requires nvidia-container-toolkit on the host):
#     docker compose -f docker-compose.yml -f docker-compose.nvidia.yml up -d
#
#   AMD ROCm GPU (requires ROCm driver on the host):
#     docker compose -f docker-compose.yml -f docker-compose.amd.yml up -d
#
# Index images:
#   docker compose run --rm sfn-web sfn --dino --sscd
#
# To index a different directory without restarting the stack:
#   docker compose run --rm -v /other/path:/images:ro sfn-web sfn /images --dino --sscd
#
# Web UI (local access):
#   http://localhost:8080
# Web UI (remote access — replace <server-ip> with the host's IP or hostname):
#   http://<server-ip>:8080
# Authentication and TLS termination are the operator's responsibility;
# place a reverse proxy (e.g. nginx, Caddy) in front for remote deployments.

services:

  qdrant:
    image: qdrant/qdrant:v1.17.1
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    # Qdrant is intentionally not published to the host — sfn-web reaches it
    # via the internal compose network (http://qdrant:6333).  To allow direct
    # host access for debugging, add a ports override in a local compose file:
    #   ports: ["127.0.0.1:6333:6333"]

  sfn-web:
    # Override when using a non-latest tag: SCALARFORENSIC_IMAGE=scalarforensic:1.0
    image: ${SCALARFORENSIC_IMAGE:-scalarforensic:latest}
    restart: unless-stopped
    depends_on:
      - qdrant
    ports:
      - "${SFN_WEB_PORT:-8080}:${SFN_WEB_PORT:-8080}"
    volumes:
      # Application config — copy .env.example → .env and edit before first run.
      - ./.env:/app/.env:ro
      # Image directory — set SFN_IMAGES_DIR in your shell or .env file.
      # Inside the container this is always /images regardless of the host path.
      - ${SFN_IMAGES_DIR:-./data}:/images:ro
    environment:
      # Route Qdrant traffic to the sidecar service (overrides .env).
      - SFN_QDRANT_URL=http://qdrant:6333
      # Clear any API key from .env — the local sidecar is unauthenticated.
      # Without this, qdrant-client warns "Api key is used with an insecure connection"
      # when .env was previously configured for a remote (cloud) Qdrant instance.
      - SFN_QDRANT_API_KEY=
      # Default input dir for the CLI indexer (used when no argument is given).
      - SFN_INPUT_DIR=/images

volumes:
  # Qdrant vector data — persists across container restarts and image updates.
  qdrant_data:
