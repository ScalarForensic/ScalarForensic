<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 232 40" role="img" aria-label="ScalarForensic">
  <!-- Icon mark -->
  <g transform="translate(2, 4)">
    <!-- Lens -->
    <circle cx="15" cy="14" r="10" fill="#101318" stroke="#e89320" stroke-width="2"/>
    <!-- Vector scatter dots -->
    <circle cx="10.5" cy="16.5" r="2" fill="#e89320"/>
    <circle cx="15.5" cy="8.5" r="1.7" fill="#dde3ec" opacity="0.85"/>
    <circle cx="20" cy="15" r="1.7" fill="#4a9ee0" opacity="0.9"/>
    <!-- Secondary dot -->
    <circle cx="12.5" cy="10.5" r="1.2" fill="#e89320" opacity="0.45"/>
    <!-- Similarity edges -->
    <line x1="10.5" y1="16.5" x2="15.5" y2="8.5" stroke="#e89320" stroke-width="1" stroke-opacity="0.55"/>
    <line x1="15.5" y1="8.5" x2="20" y2="15" stroke="#4a9ee0" stroke-width="1" stroke-opacity="0.5"/>
    <line x1="10.5" y1="16.5" x2="12.5" y2="10.5" stroke="#e89320" stroke-width="0.8" stroke-opacity="0.3"/>
    <!-- Handle -->
    <line x1="22.5" y1="22" x2="30" y2="30" stroke="#9aa3b2" stroke-width="2.8" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <text y="27"
        font-family="'Arial Narrow','Helvetica Neue Condensed','Helvetica Neue','Arial',sans-serif"
        font-weight="700"
        font-size="21"
        letter-spacing="2">
    <tspan x="44" fill="#dde3ec">SCALAR</tspan><tspan fill="#e89320">FORENSIC</tspan>
  </text>
</svg>
