<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="lensGrad" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#1e2430"/>
      <stop offset="100%" stop-color="#0d0f12"/>
    </radialGradient>
    <radialGradient id="bgGrad" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1c2230"/>
      <stop offset="100%" stop-color="#0d0f12"/>
    </radialGradient>
    <clipPath id="lensClip">
      <circle cx="208" cy="198" r="134"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="76" fill="url(#bgGrad)"/>

  <!-- Lens fill -->
  <circle cx="208" cy="198" r="134" fill="url(#lensGrad)"/>

  <!-- Faint coordinate grid inside lens -->
  <g clip-path="url(#lensClip)" opacity="0.07">
    <line x1="74"  y1="138" x2="342" y2="138" stroke="#dde3ec" stroke-width="1.5"/>
    <line x1="74"  y1="168" x2="342" y2="168" stroke="#dde3ec" stroke-width="1.5"/>
    <line x1="74"  y1="198" x2="342" y2="198" stroke="#dde3ec" stroke-width="1.5"/>
    <line x1="74"  y1="228" x2="342" y2="228" stroke="#dde3ec" stroke-width="1.5"/>
    <line x1="74"  y1="258" x2="342" y2="258" stroke="#dde3ec" stroke-width="1.5"/>
    <line x1="148" y1="64"  x2="148" y2="332" stroke="#dde3ec" stroke-width="1.5"/>
    <line x1="178" y1="64"  x2="178" y2="332" stroke="#dde3ec" stroke-width="1.5"/>
    <line x1="208" y1="64"  x2="208" y2="332" stroke="#dde3ec" stroke-width="1.5"/>
    <line x1="238" y1="64"  x2="238" y2="332" stroke="#dde3ec" stroke-width="1.5"/>
    <line x1="268" y1="64"  x2="268" y2="332" stroke="#dde3ec" stroke-width="1.5"/>
  </g>

  <!-- Similarity edges (behind dots) -->
  <g clip-path="url(#lensClip)">
    <!-- amber cluster edges -->
    <line x1="156" y1="238" x2="176" y2="166" stroke="#e89320" stroke-width="3.5" stroke-opacity="0.5"/>
    <line x1="156" y1="238" x2="226" y2="134" stroke="#e89320" stroke-width="2.5" stroke-opacity="0.28"/>
    <line x1="176" y1="166" x2="226" y2="134" stroke="#dde3ec" stroke-width="2.5" stroke-opacity="0.32"/>
    <!-- blue cluster edges -->
    <line x1="226" y1="134" x2="292" y2="206" stroke="#4a9ee0" stroke-width="3"   stroke-opacity="0.42"/>
    <line x1="292" y1="206" x2="250" y2="266" stroke="#4a9ee0" stroke-width="2.5" stroke-opacity="0.35"/>
    <!-- cross-cluster weak link -->
    <line x1="156" y1="238" x2="250" y2="266" stroke="#9aa3b2" stroke-width="2"   stroke-opacity="0.2"/>
  </g>

  <!-- Vector scatter dots -->
  <!-- Primary amber -->
  <circle cx="156" cy="238" r="15" fill="#e89320"/>
  <!-- Secondary amber (faded) -->
  <circle cx="176" cy="166" r="10" fill="#e89320" opacity="0.5"/>
  <!-- Neutral highlight -->
  <circle cx="226" cy="134" r="13" fill="#dde3ec" opacity="0.88"/>
  <!-- Primary blue -->
  <circle cx="292" cy="206" r="13" fill="#4a9ee0" opacity="0.92"/>
  <!-- Secondary blue (faded) -->
  <circle cx="250" cy="266" r="9"  fill="#4a9ee0" opacity="0.48"/>

  <!-- Lens ring -->
  <circle cx="208" cy="198" r="134" fill="none" stroke="#e89320" stroke-width="17"/>

  <!-- Lens surface highlight (subtle arc) -->
  <path d="M 116 116 A 134 134 0 0 1 290 82"
        fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-opacity="0.10"/>

  <!-- Handle body -->
  <line x1="310" y1="306" x2="442" y2="440"
        stroke="#8a94a6" stroke-width="40" stroke-linecap="round"/>
  <!-- Handle highlight -->
  <line x1="310" y1="306" x2="442" y2="440"
        stroke="white" stroke-width="10" stroke-linecap="round" stroke-opacity="0.08"/>
</svg>
